# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Installed app version. Published images set APP_VERSION at build time to the
    # released git tag (e.g. "1.2.3"), a nightly stamp ("1.2.3N", the latest
    # release the nightly was built on), or "dev". Source checkouts and the dev
    # stack fall back to app.version_fallback below, which the sidebar badge
    # renders as a "Development" build (no number, never "update available").
    app.version_fallback: 'dev'
    app.version: '%env(default:app.version_fallback:APP_VERSION)%'
    # GitHub repo (owner/name) the sidebar badge checks for the latest release.
    # Change this if you fork the project.
    app.github_repository: 'Krught/Spine-Scout'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Download plugin tags. ReleaseSourceInterface (e.g. DirectHttpSource) and
    # DownloadClientInterface (e.g. HttpDownloadClient) implementations are
    # auto-discovered via these tags.
    _instanceof:
        App\Search\Source\ReleaseSourceInterface:
            tags: ['app.release_source']
        App\Download\Client\DownloadClientInterface:
            tags: ['app.download_client']
        App\Download\Bypass\BypasserInterface:
            tags: ['app.download_bypasser']

    App\Service\CoverCache:
        arguments:
            # In-container path; the host location is configured via
            # SPINESCOUT_COVER_CACHE_DIR in .env and bind-mounted here by compose.
            $cacheDir: '%kernel.project_dir%/book-covers'

    # In-progress downloads stage in a container-internal scratch dir under var/
    # (never bind-mounted or host-exposed) before being moved to the operator's
    # configured output folder.
    App\Download\Client\HttpDownloadClient:
        arguments:
            $stagingDir: '%kernel.project_dir%/var/downloads'

    # Audiobook torrents stage under var/downloads/<staging> before the final move
    # into the library destination. Scalar arg can't be autowired.
    App\Download\Torrent\TorrentMover:
        arguments:
            $stagingBaseDir: '%kernel.project_dir%/var/downloads'

    # Dev-tools gate: scalar args can't be autowired.
    App\Dev\DevTools:
        arguments:
            $environment: '%kernel.environment%'
            $projectDir: '%kernel.project_dir%'

    # Sidebar "update available" check: scalar args can't be autowired.
    App\Service\LatestVersionProvider:
        arguments:
            $installedVersion: '%app.version%'
            $repository: '%app.github_repository%'

    # Reuse Doctrine's PDO connection so sessions share the app DB pool instead
    # of opening a second connection. LOCK_TRANSACTIONAL (1) prevents lost
    # writes when the same session is touched by concurrent requests.
    session.pdo_handler.pdo:
        class: PDO
        factory: ['@doctrine.dbal.default_connection', 'getNativeConnection']

    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '@session.pdo_handler.pdo'
            - { lock_mode: 1 }

    App\MessageHandler\PurgeExpiredSessionsHandler:
        arguments:
            $maxLifetime: 2592000

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
