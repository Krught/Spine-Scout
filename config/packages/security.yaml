security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_users
            entry_point: App\Security\JsonAwareAuthenticationEntryPoint
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: home
            logout:
                path: app_logout
                target: home

    access_control:
        - { path: ^/setup,    roles: PUBLIC_ACCESS }
        - { path: ^/login,    roles: PUBLIC_ACCESS }
        - { path: ^/logout,   roles: PUBLIC_ACCESS }
        - { path: ^/healthz,  roles: PUBLIC_ACCESS }
        - { path: ^/cache/cover, roles: PUBLIC_ACCESS }
        - { path: ^/settings, roles: ROLE_ADMIN }
        - { path: ^/,         roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
