twig:
    file_name_pattern: '*.twig'
    globals:
        app_version: '%app.version%'
        # app_latest_version is provided dynamically by App\Twig\VersionExtension
        # (resolved live from GitHub releases, cached).
        dev_tools: '@App\Dev\DevTools'

when@test:
    twig:
        strict_variables: true
