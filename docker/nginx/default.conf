server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    client_max_body_size 32M;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Symfony front controller. Only index.php is allowed to be executed.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        internal;
    }

    # Return 404 for any other .php file so they can't be executed directly.
    location ~ \.php$ {
        return 404;
    }

    # Long-cache AssetMapper fingerprinted assets.
    location ~* "^/assets/.*\.[0-9a-f]{8,}\.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$" {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_log /var/log/nginx/spinescout_error.log;
    access_log /var/log/nginx/spinescout_access.log;
}
