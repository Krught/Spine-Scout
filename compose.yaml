services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-ChangeMeInProduction}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      PHP_FPM_MAX_CHILDREN: ${PHP_FPM_MAX_CHILDREN:-15}
    volumes:
      - ${SPINESCOUT_COVER_CACHE_DIR:-./book-covers}:/var/www/html/book-covers:rw
      - ${SPINESCOUT_DOWNLOAD_DIR:-./library}:/var/www/html/library:rw
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${SPINESCOUT_HTTP_PORT:-9092}:80"
    restart: unless-stopped
    depends_on:
      - app

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: www-data
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-ChangeMeInProduction}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      SPINESCOUT_RUN_MIGRATIONS: "0"
    command:
      - php
      - bin/console
      - messenger:consume
      - async
      - scheduler_default
      - --time-limit=3600
      - --memory-limit=192M
      - -vv
    volumes:
      - ${SPINESCOUT_COVER_CACHE_DIR:-./book-covers}:/var/www/html/book-covers:rw
      - ${SPINESCOUT_DOWNLOAD_DIR:-./library}:/var/www/html/library:rw
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      app:
        condition: service_started

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - ${SPINESCOUT_DATABASE_DATA_DIR:-./application-data}:/var/lib/postgresql/data:rw

  # Bundled Cloudflare-challenge solver.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: ${TZ:-UTC}
    restart: unless-stopped
